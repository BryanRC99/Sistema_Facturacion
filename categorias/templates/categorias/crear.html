{% extends 'base.html' %}

{% block title %}Nueva Categoría{% endblock %}

{% block content %}

<div class="max-w-5xl mx-auto mt-10">

    <!-- HEADER (mismo estilo que Crear Cliente / Crear Producto) -->
    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4 mb-8">
        <div class="flex items-start gap-3">
            <span class="inline-flex items-center justify-center w-11 h-11 rounded-2xl
                         bg-indigo-50 dark:bg-indigo-500/10
                         border border-indigo-100 dark:border-indigo-500/20">
                <i data-lucide="tag" class="w-6 h-6 text-indigo-700 dark:text-indigo-300"></i>
            </span>

            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-gray-900 dark:text-slate-100">
                    Nueva Categoría
                </h1>
            </div>
        </div>

        <div class="flex flex-wrap gap-2">
            <a href="{% url 'lista_categorias' %}"
               class="inline-flex items-center gap-2
                      border border-gray-200 dark:border-white/10
                      bg-white dark:bg-slate-900
                      text-gray-700 dark:text-slate-200
                      px-4 py-2.5 rounded-xl
                      text-sm font-semibold
                      hover:bg-gray-50 dark:hover:bg-slate-800
                      transition shadow-sm">
                <i data-lucide="circle-arrow-left" class="w-4 h-4"></i>
                Volver
            </a>
        </div>
    </div>

    <!-- CARD -->
    <div class="bg-white dark:bg-slate-900
                border border-gray-200 dark:border-slate-700
                rounded-2xl shadow-xl overflow-hidden
                max-w-xl">

        <div class="px-6 sm:px-7 py-5 bg-gray-50 dark:bg-slate-800
                    border-b border-gray-200 dark:border-slate-700">
            <div class="flex items-center gap-2">
                <i data-lucide="file-text" class="w-5 h-5 text-indigo-700 dark:text-indigo-300"></i>
                <h2 class="text-lg font-bold text-gray-900 dark:text-slate-100">
                    Información de la categoría
                </h2>
            </div>
            <p class="text-sm text-gray-600 dark:text-slate-400 mt-1">
                El nombre es obligatorio.
            </p>
        </div>

        <form method="POST" class="p-6 sm:p-7 space-y-6">
            {% csrf_token %}

            <!-- Nombre -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 dark:text-slate-200 mb-2">
                    Nombre de la Categoría <span class="text-red-500">*</span>
                </label>

                <div class="relative">
                    <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                        <i data-lucide="tag" class="w-4 h-4 text-gray-400 dark:text-slate-500"></i>
                    </span>

                    <input type="text"
                           name="nombre"
                           required
                           class="w-full pl-10 pr-3 py-2.5 rounded-xl
                                  border border-gray-300 dark:border-slate-600
                                  bg-white dark:bg-slate-800
                                  text-gray-800 dark:text-slate-100
                                  placeholder-gray-400 dark:placeholder-slate-500
                                  focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>

            <!-- BOTONES -->
            <div class="flex flex-col sm:flex-row sm:justify-end gap-3 pt-2">
                <a href="{% url 'lista_categorias' %}"
                   class="inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl
                          border border-gray-200 dark:border-white/10
                          bg-white dark:bg-slate-900
                          text-gray-700 dark:text-slate-200
                          hover:bg-gray-50 dark:hover:bg-slate-800 transition">
                    <i data-lucide="circle-arrow-left" class="w-4 h-4"></i>
                    Cancelar
                </a>

                <button type="submit"
                        class="inline-flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl
                               bg-indigo-600 hover:bg-indigo-700
                               text-white font-semibold
                               shadow-md transition">
                    <i data-lucide="save" class="w-4 h-4"></i>
                    Guardar
                </button>
            </div>

        </form>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    if (window.lucide) lucide.createIcons();
});
</script>

{% endblock %}
