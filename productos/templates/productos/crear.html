{% extends 'base.html' %}

{% block title %}Crear Producto{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto bg-white shadow-xl rounded-2xl p-10 border border-gray-100">

    {% if error %}
    <div class="bg-red-100 text-red-700 px-4 py-3 rounded-lg border border-red-300 mb-6 text-center">
        {{ error }}
    </div>
    {% endif %}

    <div class="flex justify-end mb-8">

        <a href="{% url 'lista_productos' %}" class="inline-flex items-center gap-2
              text-gray-500
              px-3 py-1.5
              text-sm font-medium
              rounded-md
              hover:text-indigo-600
              hover:bg-indigo-50
              transition">

            <i data-lucide="circle-arrow-left" class="w-4 h-4"></i>
            Volver
        </a>

    </div>

    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold text-gray-800">Registrar Producto</h1>
        <p class="text-gray-500 mt-2">Complete la información necesaria</p>
        <div class="mt-4 h-[3px] w-24 bg-indigo-600 mx-auto rounded-full"></div>
    </div>

    <form method="POST" class="space-y-10" id="formProducto">
        {% csrf_token %}

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

            <!-- Código -->
            <div class="floating-label-group md:col-span-2">
                <input type="text" id="codigo" name="codigo" required minlength="3"
                    value="{{ form_data.codigo|default:'' }}" pattern="^[A-Za-z0-9-_.]+$"
                    title="Ingrese un código válido" class="floating-input peer" placeholder=" ">
                <label class="floating-label">Código del Producto</label>
            </div>

            <!-- Nombre -->
            <div class="floating-label-group md:col-span-2">
                <input type="text" name="nombre" required minlength="3" value="{{ form_data.nombre|default:'' }}"
                    class="floating-input peer" placeholder=" ">
                <label class="floating-label">Nombre del Producto</label>
            </div>

            <!-- Categoría -->
            <div class="floating-label-group md:col-span-2">
                <select name="categoria" class="floating-input peer" required>
                    <option value=""></option>
                    {% for c in categorias %}
                    <option value="{{ c.id }}" {% if form_data.categoria == c.id %} selected {% endif %}>
                        {{ c.nombre }}
                    </option>
                    {% endfor %}

                </select>
                <label class="floating-label">Categoría</label>
            </div>



            <!-- Proveedor -->
            <div class="floating-label-group md:col-span-2">
                <select name="proveedor" class="floating-input peer">
                    <option value=""></option>
                    {% for p in proveedores %}
                    <option value="{{ p.id }}" {% if form_data.proveedor == p.id %} selected {% endif %}>
                        {{ p.nombre_razon_social }}
                    </option>
                    {% endfor %}

                </select>
                <label class="floating-label">Proveedor</label>
            </div>


            <!-- Precio -->
            <div class="floating-label-group">
                <input type="number" step="0.01" name="precio" value="{{ form_data.precio|default:'' }}" required
                    class="floating-input peer" placeholder=" ">
                <label class="floating-label">Precio Venta</label>
            </div>

            <!-- Costo -->
            <div class="floating-label-group">
                <input type="number" step="0.01" name="costo" value="{{ form_data.costo|default:'' }}" required
                    class="floating-input peer" placeholder=" ">
                <label class="floating-label">Costo</label>
            </div>

            <!-- Stock -->
            <div class="floating-label-group">
                <input type="number" name="stock" value="{{ form_data.stock|default:'' }}" required
                    class="floating-input peer" placeholder=" ">

                <label class="floating-label">Stock</label>
            </div>

            <!-- IVA -->
            <div class="flex items-center gap-3">
                <input type="checkbox" name="iva" class="w-5 h-5" {% if form_data.iva %}checked{% endif %}>

                <label class="text-gray-700 font-medium">Aplica IVA (12%)</label>
            </div>

            <!-- Estado -->
            <div class="flex items-center gap-3">
                <input type="checkbox" name="estado" class="w-5 h-5" {% if form_data.estado %}checked{% endif %}>
                <label class="text-gray-700 font-medium">Activo</label>
            </div>

            <!-- Descripción -->
            <div class="floating-label-group md:col-span-2">
                <textarea name="descripcion" rows="3" class="floating-input peer"
                    placeholder=" ">{{ form_data.descripcion|default:'' }}</textarea>

                <label class="floating-label">Descripción</label>
            </div>

        </div>

        <div class="flex justify-end">
            <button type="submit" class="px-10 py-3 bg-indigo-600 text-white rounded-xl text-lg font-semibold 
                       shadow-md hover:bg-indigo-700 hover:shadow-lg transition-all transform hover:-translate-y-0.5">
                Guardar Producto
            </button>
        </div>
    </form>
</div>

<!-- Validación de código -->
<script>
    document.addEventListener("DOMContentLoaded", () => {

        const inputCodigo = document.getElementById("codigo");
        const form = document.getElementById("formProducto");

        form.addEventListener("submit", async (e) => {
            const codigo = inputCodigo.value.trim().toLowerCase();

            if (!codigo) return;

            const respuesta = await fetch(`/productos/verificar-codigo/?codigo=${encodeURIComponent(codigo)}`);
            const data = await respuesta.json();

            if (data.existe) {
                e.preventDefault();
                alert("El código ingresado ya existe. Debe ser único.");
                inputCodigo.focus();
            }
        });

    });
</script>

<!-- Floating Label Styles (REUTILIZADOS DE CLIENTES) -->
<style>
    .floating-label-group {
        position: relative;
    }

    .floating-input {
        width: 100%;
        padding: 14px 12px;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        background: #f9fafb;
        outline: none;
        transition: all 0.2s ease-in-out;
    }

    .floating-input:focus {
        border-color: #6366f1;
        background: white;
        box-shadow: 0 0 0 3px #6366f130;
    }

    .floating-label {
        position: absolute;
        left: 14px;
        top: 14px;
        padding: 0 6px;
        background: white;
        color: #6b7280;
        font-size: 0.95rem;
        pointer-events: none;
        transition: all 0.2s ease-in-out;
    }

    .peer:focus~.floating-label,
    .peer:not(:placeholder-shown)~.floating-label {
        top: -8px;
        left: 10px;
        font-size: 0.75rem;
        color: #4f46e5;
        background: white;
    }
</style>

{% endblock %}
