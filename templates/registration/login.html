{% extends "base_auth.html" %}
{% load static %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="relative min-h-screen flex items-center justify-center overflow-hidden">

    <!-- FONDO -->
    <div class="absolute inset-0">
        <img src="{% static 'img/login-bg.jpg' %}" class="w-full h-full object-cover blur-md scale-110" alt="Fondo">
        <div class="absolute inset-0 bg-black/40"></div>
    </div>

    <!-- CARD LOGIN -->
    <div class="relative z-10 w-full max-w-md
            bg-gray-900/70 backdrop-blur-2xl
            rounded-2xl shadow-2xl
            border border-white/10
            p-8 text-white">

        <!-- LOGO -->
        <div class="flex justify-center mb-4">
            <img src="{% static 'img/logo.png' %}" alt="Logo" class="h-20 object-contain">
        </div>

        <h2 class="text-3xl font-bold text-center mb-2">
            Sistema de Facturación
        </h2>
        <p class="text-center text-gray-300 mb-6">
            Ingrese sus credenciales
        </p>

        {% if form.errors %}
        <div class="bg-red-500/20 text-red-300 p-3 rounded-lg mb-4 text-center">
            Usuario o contraseña incorrectos
        </div>
        {% endif %}

        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-gray-300 mb-1">Usuario</label>
                <input type="text" name="username" autofocus required class="w-full px-4 py-3 rounded-xl
                          bg-white/10 text-white
                          border border-white/20
                          placeholder-gray-400
                          focus:ring-2 focus:ring-indigo-500
                          focus:border-indigo-500 outline-none">
            </div>

            <div>
                <label class="block text-gray-300 mb-1">Contraseña</label>
                <input type="password" name="password" required class="w-full px-4 py-3 rounded-xl
                          bg-white/10 text-white
                          border border-white/20
                          placeholder-gray-400
                          focus:ring-2 focus:ring-indigo-500
                          focus:border-indigo-500 outline-none">
            </div>

            <button type="submit" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-semibold
                       hover:bg-indigo-700 transition transform hover:-translate-y-0.5">
                Ingresar
            </button>
        </form>
    </div>

</div>
{% endblock %}
