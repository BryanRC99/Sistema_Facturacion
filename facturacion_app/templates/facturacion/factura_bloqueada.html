{% extends "base.html" %}

{% block title %}Factura anulada{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="bg-white p-8 rounded-3xl shadow-xl max-w-md text-center space-y-4">

        <div class="flex justify-center">
            <svg class="w-14 h-14 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 9v3m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 
                         1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 
                         0L4.34 17c-.77 1.333.192 3 1.732 3z"/>
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-gray-800">
            Factura anulada
        </h1>

        <p class="text-gray-600">
            La factura <strong>{{ factura.numero }}</strong> ha sido anulada y
            <span class="text-red-500 font-semibold">no puede imprimirse</span>.
        </p>

        <div class="pt-4 flex justify-center gap-3">
            <a href="{% url 'factura_lista' %}"
               class="px-5 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition">
                Volver
            </a>
        </div>

    </div>
</div>
{% endblock %}
