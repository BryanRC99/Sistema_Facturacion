{% extends "base.html" %}

{% block title %}Contraseña actualizada{% endblock %}

{% block content %}
<div class="w-full px-6 lg:px-10 py-10">
  <div class="max-w-3xl mx-auto">
    <div class="rounded-2xl border border-gray-100 dark:border-slate-700 bg-white dark:bg-slate-900 shadow-sm p-8">

      <div class="flex items-start gap-4">
        <div class="w-12 h-12 rounded-2xl bg-green-50 dark:bg-green-500/10 flex items-center justify-center">
          <i data-lucide="check-circle-2" class="w-7 h-7 text-green-600 dark:text-green-400"></i>
        </div>

        <div class="flex-1">
          <h2 class="text-2xl font-bold text-gray-900 dark:text-slate-100">
            Contraseña actualizada
          </h2>
          <p class="mt-1 text-gray-600 dark:text-slate-400">
            Por seguridad, se cerrará tu sesión. Inicia sesión con tu nueva contraseña.
          </p>

          <div class="mt-6 flex items-center justify-between flex-wrap gap-3">
            <p class="text-sm text-gray-500 dark:text-slate-400">
              Redirigiendo al inicio de sesión en
              <span id="countdown" class="font-bold text-gray-900 dark:text-slate-100">{{ seconds }}</span>
              segundos…
            </p>

            <a href="{{ redirect_url }}"
               class="inline-flex items-center gap-2 px-4 py-2 rounded-xl font-semibold
                      border border-gray-200 dark:border-slate-700
                      text-gray-700 dark:text-slate-200
                      bg-white dark:bg-slate-800
                      hover:bg-gray-50 dark:hover:bg-slate-700 transition">
              Ir ahora
              <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </a>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    if (window.lucide) lucide.createIcons();

    let s = Number("{{ seconds }}") || 5;
    const el = document.getElementById("countdown");

    const timer = setInterval(() => {
      s -= 1;
      if (el) el.textContent = String(s);

      if (s <= 0) {
        clearInterval(timer);
        window.location.href = "{{ redirect_url }}";
      }
    }, 1000);
  });
</script>
{% endblock %}
