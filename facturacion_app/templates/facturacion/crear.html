{% extends 'base.html' %}

{% block title %}Nueva Factura{% endblock %}

{% block content %}

<h1 class="text-3xl font-bold text-gray-800 mb-6">Crear Factura</h1>

<form method="POST">
    {% csrf_token %}

    <div class="bg-white p-6 rounded-xl shadow-xl mb-6">

        <!-- Cliente -->
        <div class="mb-4">
            <label class="block font-semibold text-gray-700 mb-1">Cliente:</label>
            <select name="cliente" class="w-full border rounded-lg p-2">
                {% for c in clientes %}
                    <option value="{{ c.id }}">{{ c.nombre_razon_social }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Forma de pago -->
        <div class="mb-4">
            <label class="block font-semibold text-gray-700 mb-1">Forma de pago:</label>
            <select name="forma_pago" class="w-full border rounded-lg p-2">
                <option value="EFECTIVO">Efectivo</option>
                <option value="TARJETA">Tarjeta</option>
                <option value="TRANSFERENCIA">Transferencia</option>
                <option value="OTROS">Otros</option>
            </select>
        </div>
    </div>

    <!-- DETALLES -->
    <div class="bg-white p-6 rounded-xl shadow-xl">

        <h2 class="text-xl font-bold mb-4">Detalles</h2>

        <table class="w-full text-sm mb-4" id="tabla-detalles">
            <thead>
                <tr class="bg-gray-100 text-gray-600 uppercase text-sm leading-normal">
                    <th class="py-2 px-3">Producto</th>
                    <th class="py-2 px-3">Cantidad</th>
                    <th class="py-2 px-3">Precio</th>
                    <th class="py-2 px-3">Descuento</th>
                    <th class="py-2 px-3">Subtotal</th>
                    <th></th>
                </tr>
            </thead>

            <tbody id="detalle-body">
            </tbody>
        </table>

        <button type="button" onclick="agregarFila()"
            class="bg-green-600 text-white px-4 py-2 rounded-lg shadow hover:bg-green-700 transition">
            + Agregar Producto
        </button>

    </div>

    <div class="flex justify-end mt-6">
        <button class="bg-indigo-600 text-white px-6 py-3 rounded-lg shadow hover:bg-indigo-700 text-lg">
            Guardar Factura
        </button>
    </div>

</form>


<script>

    function agregarFila() {
        let tbody = document.getElementById("detalle-body");

        let row = document.createElement("tr");

        row.innerHTML = `
            <td class="py-2 px-3">
                <select name="producto_id" class="border p-2 rounded-lg w-full" onchange="actualizarPrecio(this)">
                    <option value="">Seleccione…</option>
                    {% for p in productos %}
                        <option value="{{ p.id }}" data-precio="{{ p.precio }}">{{ p.nombre }}</option>
                    {% endfor %}
                </select>
            </td>

            <td class="py-2 px-3">
                <input type="number" name="cantidad" value="1" min="1"
                       class="border p-2 rounded-lg w-full" onchange="calcularFila(this)">
            </td>

            <td class="py-2 px-3">
                <input type="number" step="0.01" name="precio_unitario"
                       class="border p-2 rounded-lg w-full" onchange="calcularFila(this)">
            </td>

            <td class="py-2 px-3">
                <input type="number" step="0.01" name="descuento" value="0"
                       class="border p-2 rounded-lg w-full" onchange="calcularFila(this)">
            </td>

            <td class="py-2 px-3">
                <input type="text" name="subtotal" readonly
                       class="border p-2 rounded-lg w-full bg-gray-100">
            </td>

            <td>
                <button type="button" onclick="this.parentNode.parentNode.remove()"
                        class="text-red-600 font-bold">X</button>
            </td>
        `;

        tbody.appendChild(row);
    }


    function actualizarPrecio(select) {
        let precio = select.options[select.selectedIndex].dataset.precio || 0;
        let fila = select.closest("tr");
        fila.querySelector('input[name="precio_unitario"]').value = precio;
        calcularFila(select);
    }


    function calcularFila(el) {
        let fila = el.closest("tr");

        let cantidad = parseFloat(fila.querySelector('input[name="cantidad"]').value) || 0;
        let precio = parseFloat(fila.querySelector('input[name="precio_unitario"]').value) || 0;
        let descuento = parseFloat(fila.querySelector('input[name="descuento"]').value) || 0;

        let sub = (cantidad * precio) - descuento;
        fila.querySelector('input[name="subtotal"]').value = sub.toFixed(2);
    }

</script>

{% endblock %}
