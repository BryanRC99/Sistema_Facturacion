{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

    <!-- NAVBAR -->
    <header class="bg-gray-900 text-white fixed top-0 w-full z-50 shadow">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">

                <!-- LOGO -->
                <div class="flex items-center gap-3">
                    <img src="{% static 'img/logo.png' %}" class="h-9 w-9">
                    <span class="font-semibold text-lg">Mi Empresa</span>
                </div>

                <!-- BOTÓN MÓVIL -->
                <button id="menu-btn" class="md:hidden">
                    <svg class="h-7 w-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>

                <!-- MENÚ DESKTOP -->
                <nav class="hidden md:flex items-center gap-4">

                    <!-- CLIENTES -->
                    <a href="/clientes/" class="nav-item {% if '/clientes/' in request.path %}active{% endif %}">
                        <i data-lucide="user-round" class="w-5 h-5"></i>
                        Clientes
                    </a>


                    <!-- PROVEEDORES -->
                    <a href="/proveedores/" class="nav-item {% if '/proveedores/' in request.path %}active{% endif %}">
                        <i data-lucide="square-user" class="w-5 h-5"></i>
                        Proveedores
                    </a>


                    <!-- PRODUCTOS -->
                    <div class="relative group">
                        <div class="nav-item cursor-pointer
                        {% if '/productos/' in request.path or '/categorias/' in request.path %}active{% endif %}">
                            <i data-lucide="shopping-basket" class="w-5 h-5"></i>
                            </svg>
                            Productos
                            <svg class="h-4 w-4 ml-1 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                            </svg>
                        </div>

                        <!-- ZONA DE HOVER -->
                        <div class="absolute left-0 top-full w-52 pt-2">

                            <!-- SUBMENÚ -->
                            <div class="bg-white text-gray-800 rounded-lg shadow-lg
                                   opacity-0 invisible group-hover:opacity-100 group-hover:visible
                                   transform scale-95 group-hover:scale-100 transition-all duration-200">

                                <a href="/productos/" class="dropdown-item">
                                    <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                                    Productos
                                </a>

                                <a href="/categorias/" class="dropdown-item">
                                    <i data-lucide="chart-bar-stacked" class="w-5 h-5"></i>
                                    Categorías
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- FACTURAS -->
                    <a href="/facturas/" class="nav-item {% if '/facturas/' in request.path %}active{% endif %}">
                        <i data-lucide="receipt" class="w-5 h-5"></i>
                        Facturas
                    </a>

                    <!-- SALIR -->
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button class="flex items-center gap-2 px-3 py-2 rounded-lg
                               bg-red-600/20 text-red-400
                               hover:bg-red-600 hover:text-white transition">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                            Salir
                        </button>
                    </form>

                </nav>
            </div>
        </div>

        <!-- MENÚ MÓVIL -->
        <div id="mobile-menu" class="hidden md:hidden bg-gray-800">
            <nav class="flex flex-col px-4 py-3 space-y-1">

                <a href="/clientes/" class="mobile-item">👥 Clientes</a>

                <a href="/proveedores/" class="mobile-item">🏭 Proveedores</a>

                <details>
                    <summary class="mobile-item cursor-pointer">📦 Productos</summary>
                    <div class="ml-4">
                        <a href="/productos/" class="mobile-sub">Productos</a>
                        <a href="/categorias/" class="mobile-sub">Categorías</a>
                    </div>
                </details>

                <a href="/facturas/" class="mobile-item">🧾 Facturas</a>

                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button class="mobile-item text-red-400">🚪 Salir</button>
                </form>

            </nav>
        </div>
    </header>

    <!-- CONTENIDO -->
    <main class="pt-20 px-6">
        <div class="max-w-7xl mx-auto">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- SCRIPT -->
    <script>
        document.getElementById("menu-btn").addEventListener("click", () => {
            document.getElementById("mobile-menu").classList.toggle("hidden");
        });
    </script>

    <!-- ESTILOS -->
    <style>
        .nav-item {
            display: flex;
            align-items: center;
            gap: .4rem;
            padding: .35rem .6rem;
            color: #e5e7eb;
            transition: all .2s;
        }

        .nav-item:hover {
            color: #9ca3af;
        }

        .nav-item.active {
            color: #60a5fa;
        }

        .icon {
            width: 18px;
            height: 18px;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .6rem 1rem;
            font-size: .9rem;
        }

        .dropdown-item:hover {
            background: #f3f4f6;
        }

        .mobile-item {
            padding: .6rem .75rem;
            border-radius: .375rem;
        }

        .mobile-item:hover {
            background: #374151;
        }

        .mobile-sub {
            display: block;
            padding: .4rem .75rem;
            color: #d1d5db;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        lucide.createIcons();
    </script>

</body>
</html>

</body>

</html>
