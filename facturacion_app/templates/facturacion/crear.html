{% extends 'base.html' %}

{% block title %}Nueva Factura{% endblock %}

{% block content %}

<h1 class="text-3xl font-bold text-gray-800 dark:text-slate-100 mb-6">
    Crear Factura
</h1>

<form method="POST">
    {% csrf_token %}

    <!-- DATOS GENERALES -->
    <div class="bg-white dark:bg-slate-900
                p-6 rounded-xl shadow-xl mb-6
                border border-gray-100 dark:border-slate-700">

        <!-- Cliente -->
        <div class="mb-4">
            <label class="block font-semibold text-gray-700 dark:text-slate-300 mb-1">
                Cliente:
            </label>
            <select name="cliente"
                class="w-full rounded-lg p-2
                       bg-gray-50 dark:bg-slate-800
                       border border-gray-300 dark:border-slate-600
                       text-gray-800 dark:text-slate-100
                       focus:ring-2 focus:ring-indigo-500">
                {% for c in clientes %}
                    <option value="{{ c.id }}">{{ c.nombre_razon_social }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Forma de pago -->
        <div class="mb-4">
            <label class="block font-semibold text-gray-700 dark:text-slate-300 mb-1">
                Forma de pago:
            </label>
            <select name="forma_pago"
                class="w-full rounded-lg p-2
                       bg-gray-50 dark:bg-slate-800
                       border border-gray-300 dark:border-slate-600
                       text-gray-800 dark:text-slate-100
                       focus:ring-2 focus:ring-indigo-500">
                <option value="EFECTIVO">Efectivo</option>
                <option value="TARJETA">Tarjeta</option>
                <option value="TRANSFERENCIA">Transferencia</option>
                <option value="OTROS">Otros</option>
            </select>
        </div>

    </div>

    <!-- DETALLES -->
    <div class="bg-white dark:bg-slate-900
                p-6 rounded-xl shadow-xl
                border border-gray-100 dark:border-slate-700">

        <h2 class="text-xl font-bold mb-4 text-gray-800 dark:text-slate-100">
            Detalles
        </h2>

        <div class="overflow-x-auto">
            <table class="w-full text-sm mb-4 border-collapse">
                <thead>
                    <tr class="bg-gray-100 dark:bg-slate-800
                               text-gray-600 dark:text-slate-300
                               uppercase text-sm">
                        <th class="py-2 px-3">Producto</th>
                        <th class="py-2 px-3">Cantidad</th>
                        <th class="py-2 px-3">Precio</th>
                        <th class="py-2 px-3">Descuento</th>
                        <th class="py-2 px-3">Subtotal</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody id="detalle-body"
                       class="text-gray-700 dark:text-slate-200">
                </tbody>
            </table>
        </div>

        <button type="button" onclick="agregarFila()"
            class="bg-green-600 text-white px-4 py-2 rounded-lg shadow
                   hover:bg-green-700 transition">
            + Agregar Producto
        </button>

    </div>

    <!-- BOTÓN -->
    <div class="flex justify-end mt-6">
        <button
            class="bg-indigo-600 text-white px-6 py-3 rounded-lg shadow
                   hover:bg-indigo-700 text-lg transition">
            Guardar Factura
        </button>
    </div>

</form>

<!-- JS -->
<script>
    function agregarFila() {
        let tbody = document.getElementById("detalle-body");

        let row = document.createElement("tr");
        row.className = "border-b border-gray-200 dark:border-slate-700";

        row.innerHTML = `
            <td class="py-2 px-3">
                <select name="producto_id"
                        class="w-full rounded-lg p-2
                               bg-gray-50 dark:bg-slate-800
                               border border-gray-300 dark:border-slate-600
                               text-gray-800 dark:text-slate-100"
                        onchange="actualizarPrecio(this)">
                    <option value="">Seleccione…</option>
                    {% for p in productos %}
                        <option value="{{ p.id }}" data-precio="{{ p.precio }}">
                            {{ p.nombre }}
                        </option>
                    {% endfor %}
                </select>
            </td>

            <td class="py-2 px-3">
                <input type="number" name="cantidad" value="1" min="1"
                       class="w-full rounded-lg p-2
                              bg-gray-50 dark:bg-slate-800
                              border border-gray-300 dark:border-slate-600
                              text-gray-800 dark:text-slate-100"
                       onchange="calcularFila(this)">
            </td>

            <td class="py-2 px-3">
                <input type="number" step="0.01" name="precio_unitario"
                       class="w-full rounded-lg p-2
                              bg-gray-50 dark:bg-slate-800
                              border border-gray-300 dark:border-slate-600
                              text-gray-800 dark:text-slate-100"
                       onchange="calcularFila(this)">
            </td>

            <td class="py-2 px-3">
                <input type="number" step="0.01" name="descuento" value="0"
                       class="w-full rounded-lg p-2
                              bg-gray-50 dark:bg-slate-800
                              border border-gray-300 dark:border-slate-600
                              text-gray-800 dark:text-slate-100"
                       onchange="calcularFila(this)">
            </td>

            <td class="py-2 px-3">
                <input type="text" name="subtotal" readonly
                       class="w-full rounded-lg p-2
                              bg-gray-100 dark:bg-slate-700
                              border border-gray-300 dark:border-slate-600
                              text-gray-800 dark:text-slate-100">
            </td>

            <td class="text-center">
                <button type="button"
                        onclick="this.closest('tr').remove()"
                        class="text-red-600 dark:text-red-400 font-bold hover:scale-110 transition">
                    ✕
                </button>
            </td>
        `;

        tbody.appendChild(row);
    }

    function actualizarPrecio(select) {
        let precio = select.options[select.selectedIndex].dataset.precio || 0;
        let fila = select.closest("tr");
        fila.querySelector('input[name="precio_unitario"]').value = precio;
        calcularFila(select);
    }

    function calcularFila(el) {
        let fila = el.closest("tr");

        let cantidad = parseFloat(fila.querySelector('input[name="cantidad"]').value) || 0;
        let precio = parseFloat(fila.querySelector('input[name="precio_unitario"]').value) || 0;
        let descuento = parseFloat(fila.querySelector('input[name="descuento"]').value) || 0;

        let sub = (cantidad * precio) - descuento;
        fila.querySelector('input[name="subtotal"]').value = sub.toFixed(2);
    }
</script>

{% endblock %}
