{% extends 'base.html' %}

{% block title %}Editar Categoría{% endblock %}

{% block content %}

<div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold text-gray-800">Editar Categoría</h1>
    <a href="{% url 'lista_categorias' %}" 
       class="bg-gray-200 text-gray-800 px-4 py-2 rounded-lg shadow hover:bg-gray-300 transition">
        Volver a Categorías
    </a>
</div>

<div class="bg-white p-6 rounded-xl shadow-xl w-full max-w-md">
    <form method="POST" class="space-y-4">
        {% csrf_token %}

        <div>
            <label class="block text-gray-700 font-semibold mb-1" for="nombre">
                Nombre de la Categoría
            </label>
            <input type="text" id="nombre" name="nombre" value="{{ categoria.nombre }}"
                   class="w-full border border-gray-300 px-3 py-2 rounded-lg focus:ring-2 focus:ring-indigo-400"
                   required>
        </div>

        <div class="flex justify-end gap-3">
            <a href="{% url 'lista_categorias' %}" 
               class="px-4 py-2 rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 transition">
                Cancelar
            </a>

            <button type="submit"
                    class="px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 shadow transition font-semibold">
                Actualizar
            </button>
        </div>
    </form>
</div>

{% endblock %}
